name: Lint, Security, and Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    name: Lint, Security, and Tests
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce PR template usage
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          import sys

          event_path = os.environ["GITHUB_EVENT_PATH"]

          with open(event_path, "r", encoding="utf-8") as file:
              event = json.load(file)

          pr = event.get("pull_request") or {}
          body = pr.get("body") or ""

          required_sections = [
              "## Summary",
              "## Problem Statement",
              "## Motivation",
              "## Implementation",
              "## Validation",
              "## Pre-Flight Check",
          ]

          missing_sections = [section for section in required_sections if section not in body]

          if missing_sections:
              print("Missing required PR sections:")
              for section in missing_sections:
                  print(f"- {section}")
              sys.exit(1)

          print("PR template enforcement passed.")
          PY

      - name: Enforce Pre-Flight Checklist acknowledgement
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          import sys

          event_path = os.environ["GITHUB_EVENT_PATH"]

          with open(event_path, "r", encoding="utf-8") as file:
              event = json.load(file)

          pr = event.get("pull_request") or {}
          body = pr.get("body") or ""

          if "## Pre-Flight Check" not in body:
              print("Missing '## Pre-Flight Check' section")
              sys.exit(1)

          if "- [x]" not in body and "- [X]" not in body:
              print("Pre-Flight checklist not acknowledged")
              sys.exit(1)

          print("Pre-Flight checklist enforcement passed.")
          PY

      - name: Check repo hygiene
        run: |
          # Fail if tracked files include Python cache or virtual environment artifacts
          if git ls-files | grep -E '(^|/)(__pycache__/|.*\.pyc$|venv/)' > /dev/null; then
            echo "Tracked local artifacts detected."
            echo "Remove __pycache__, .pyc, or venv files from the repository."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: PYTHONPATH=. pytest
