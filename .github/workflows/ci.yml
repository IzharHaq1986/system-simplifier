name: Lint, Security, and Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint, Security, and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check repo hygiene
        run: |
          # Fail if tracked files include Python cache or virtual environment artifacts
          if git ls-files | grep -E '(^|/)(__pycache__/|.*\.pyc$|venv/)' > /dev/null; then
            echo "Tracked local artifacts detected."
            echo "Remove __pycache__, .pyc, or venv files from the repository."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest
